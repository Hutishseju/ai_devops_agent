<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DevOps AI Agent</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #020617;
            padding: 15px;
            border-right: 1px solid #1e293b;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 16px;
            margin-bottom: 15px;
        }

        .chat-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #1e293b;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-item:hover {
            background: #334155;
        }

        /* Main Chat */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 15px;
            font-size: 18px;
            border-bottom: 1px solid #1e293b;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .user {
            text-align: right;
            color: #38bdf8;
        }

        .bot {
            text-align: left;
            color: #22c55e;
            line-height: 1.6;
        }

        /* Input */
        .input-box {
            display: flex;
            padding: 15px;
            border-top: 1px solid #1e293b;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #1e293b;
            color: white;
        }

        button {
            margin-left: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: black;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #16a34a;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>💬 Conversations</h2>
        <button onclick="newChat()" style="width:100%; margin-bottom:10px;">
            + New Chat
        </button>
        <div id="history"></div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="header">🤖 DevOps AI Agent</div>

        <div id="chat-box" class="chat-box"></div>

        <div class="input-box">
            <input id="input" placeholder="Ask DevOps question..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</body>

</html>
